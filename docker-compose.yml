services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: noche_talentos
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - noche_talentos_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d noche_talentos"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://app:secret@postgres:5432/noche_talentos
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      BASE_URL: ${BASE_URL:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  noche_talentos_pgdata:
    external: true
