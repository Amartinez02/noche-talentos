<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">

  <!-- ♪ nota negra — arriba izquierda -->
  <g transform="translate(28, 52) rotate(-14)" opacity="0.12">
    <ellipse cx="0" cy="0" rx="9" ry="6.5" fill="#F6EDD8" transform="rotate(-15)"/>
    <line x1="9" y1="-2" x2="9" y2="-42" stroke="#F6EDD8" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M9 -42 Q34 -50 32 -32" fill="#F6EDD8"/>
  </g>

  <!-- ♫ doble nota — arriba derecha -->
  <g transform="translate(210, 28) rotate(9)" opacity="0.1">
    <ellipse cx="0" cy="0" rx="8" ry="5.5" fill="#F0A500" transform="rotate(-15)"/>
    <line x1="8" y1="-1.5" x2="8" y2="-34" stroke="#F0A500" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="24" cy="-6" rx="8" ry="5.5" fill="#F0A500" transform="rotate(-15 24 -6)"/>
    <line x1="32" y1="-7.5" x2="32" y2="-34" stroke="#F0A500" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="-34" x2="32" y2="-34" stroke="#F0A500" stroke-width="3.5" stroke-linecap="square"/>
  </g>

  <!-- Micrófono -->
  <g transform="translate(262, 112) rotate(-8) scale(1.1)" opacity="0.1">
    <rect x="-10" y="-28" width="20" height="32" rx="10" fill="#F6EDD8"/>
    <path d="M-16 2 Q-16 18 0 18 Q16 18 16 2" stroke="#F6EDD8" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="0" y1="18" x2="0" y2="30" stroke="#F6EDD8" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="30" x2="10" y2="30" stroke="#F6EDD8" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- ♩ nota sola — izquierda centro -->
  <g transform="translate(52, 185) rotate(13)" opacity="0.11">
    <ellipse cx="0" cy="0" rx="9" ry="6.5" fill="#F0A500" transform="rotate(-15)"/>
    <line x1="9" y1="-2" x2="9" y2="-44" stroke="#F0A500" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Audífonos -->
  <g transform="translate(155, 158) scale(1.05)" opacity="0.09">
    <path d="M-28 0 Q-28 -36 0 -36 Q28 -36 28 0" stroke="#F6EDD8" stroke-width="4" fill="none" stroke-linecap="round"/>
    <rect x="-34" y="-6" width="13" height="22" rx="6.5" fill="#F6EDD8"/>
    <rect x="21" y="-6" width="13" height="22" rx="6.5" fill="#F6EDD8"/>
  </g>

  <!-- Casete -->
  <g transform="translate(52, 268) rotate(-6)" opacity="0.09">
    <rect x="-36" y="-22" width="72" height="44" rx="5" fill="#F6EDD8"/>
    <rect x="-28" y="-16" width="56" height="32" rx="3" fill="#7B1717" opacity="0.3"/>
    <circle cx="-14" cy="4" r="9" fill="#7B1717" opacity="0.3"/>
    <circle cx="14" cy="4" r="9" fill="#7B1717" opacity="0.3"/>
  </g>

  <!-- ♬ cuatro semicorcheas -->
  <g transform="translate(248, 262) rotate(-11)" opacity="0.1">
    <ellipse cx="0" cy="0" rx="8" ry="5.5" fill="#F6EDD8" transform="rotate(-15)"/>
    <line x1="8" y1="-1.5" x2="8" y2="-36" stroke="#F6EDD8" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="22" cy="-5" rx="8" ry="5.5" fill="#F6EDD8" transform="rotate(-15 22 -5)"/>
    <line x1="30" y1="-6.5" x2="30" y2="-36" stroke="#F6EDD8" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="-36" x2="30" y2="-36" stroke="#F6EDD8" stroke-width="3.5" stroke-linecap="square"/>
    <line x1="8" y1="-28" x2="30" y2="-28" stroke="#F6EDD8" stroke-width="2.5" stroke-linecap="square"/>
  </g>

  <!-- ♪ pequeña — esquina -->
  <g transform="translate(0, 310) rotate(8)" opacity="0.09">
    <ellipse cx="0" cy="0" rx="7" ry="5" fill="#F0A500" transform="rotate(-15)"/>
    <line x1="7" y1="-1" x2="7" y2="-30" stroke="#F0A500" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M7 -30 Q24 -36 22 -22" fill="#F0A500"/>
  </g>

  <!-- ♩ esquina derecha -->
  <g transform="translate(310, 10) rotate(-18)" opacity="0.1">
    <ellipse cx="0" cy="0" rx="7" ry="5" fill="#F0A500" transform="rotate(-15)"/>
    <line x1="7" y1="-1" x2="7" y2="-32" stroke="#F0A500" stroke-width="2.5" stroke-linecap="round"/>
  </g>

</svg>
